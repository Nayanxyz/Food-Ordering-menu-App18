<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Restaurant Menu App </title>
</head>
<body>
    <h1> Restaurant Menu </h1>
        {% for meal in meals %}
            <h2> {{ meal.1 }}</h2>
            {% for row in item_list %}
                {% if row.meal_type == meal.0 %}
                    {% if row.status == 0 %}
                        <a href="https://example.com"><h3><del>{{ row.meal }}</del></h3></a>
                        <p>{{ row.description }}</p>
                    {% else %}
                        <a href="https://example.com"><h3>{{ row.meal }}</h3></a>
                    {% endif %}
                {% endif %}
            {% endfor %}
        {% endfor %}
</body>
</html>
